name: Markdown Lint

on:
  push:
    branches: [main, develop]
    paths:
      - '**.md'
  pull_request:
    branches: [main]
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  markdownlint:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.41.0

      - name: Run markdownlint
        run: |
          markdownlint "**/*.md" \
            --ignore "node_modules/**" \
            --ignore "**/node_modules/**" \
            --config .markdownlint.json || true

      - name: Annotate results
        if: failure()
        run: echo "::error::Markdown linting found issues. Please fix them."
