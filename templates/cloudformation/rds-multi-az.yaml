AWSTemplateFormatVersion: '2010-09-09'
Description: 'RDS Multi-AZ Database with Security Groups and Subnet Group - Production Ready'

Parameters:
  EnvironmentName:
    Type: String
    Default: Production
    Description: Environment name

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the database

  PrivateSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for the database (minimum 2 for Multi-AZ)

  DBEngine:
    Type: String
    Default: mysql
    AllowedValues:
      - mysql
      - postgres
      - mariadb
      - sqlserver-ex
      - oracle-se2
    Description: Database engine

  DBEngineVersion:
    Type: String
    Default: '8.0'
    Description: Database engine version

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.t3.large
      - db.t3.xlarge
      - db.m6g.large
      - db.m6g.xlarge
    Description: Database instance class

  DBName:
    Type: String
    Default: myappdb
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9_]*'
    Description: Database name

  DBUsername:
    Type: String
    Default: dbadmin
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9_]*'
    Description: Database master username

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9!@#$%^&*]*'
    Description: Database master password

  AllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 65536
    Description: Allocated storage in GB

  MaxAllocatedStorage:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 65536
    Description: Maximum storage for autoscaling

  BackupRetentionPeriod:
    Type: Number
    Default: 7
    MinValue: 0
    MaxValue: 35
    Description: Backup retention period in days

  EnableMultiAZ:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable Multi-AZ deployment

  EnableEncryption:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable storage encryption

Conditions:
  IsMultiAZ: !Equals [!Ref EnableMultiAZ, 'true']
  IsEncrypted: !Equals [!Ref EnableEncryption, 'true']

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub ${EnvironmentName}-db-subnet-group
      DBSubnetGroupDescription: Subnet group for RDS database
      SubnetIds: !Ref PrivateSubnets
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-db-subnet-group
        - Key: Environment
          Value: !Ref EnvironmentName

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${EnvironmentName}-db-sg
      GroupDescription: Security group for RDS database
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !If [IsMySQL, 3306, !If [IsPostgres, 5432, 1433]]
          ToPort: !If [IsMySQL, 3306, !If [IsPostgres, 5432, 1433]]
          CidrIp: 10.0.0.0/8
          Description: Database access from internal network
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-db-sg
        - Key: Environment
          Value: !Ref EnvironmentName

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom parameters for database
      Family: !Sub ${DBEngine}${DBEngineVersion}
      Parameters:
        slow_query_log: '1'
        long_query_time: '2'
        max_connections: '500'

  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${EnvironmentName}-db
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      Engine: !Ref DBEngine
      EngineVersion: !Ref DBEngineVersion
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref AllocatedStorage
      MaxAllocatedStorage: !Ref MaxAllocatedStorage
      StorageType: gp3
      StorageEncrypted: !Ref EnableEncryption
      MultiAZ: !Ref EnableMultiAZ
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      DBParameterGroupName: !Ref DBParameterGroup
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      PreferredBackupWindow: 03:00-04:00
      PreferredMaintenanceWindow: Mon:04:00-Mon:05:00
      AutoMinorVersionUpgrade: true
      CopyTagsToSnapshot: true
      DeletionProtection: false
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt EnhancedMonitoringRole.Arn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-database
        - Key: Environment
          Value: !Ref EnvironmentName

  EnhancedMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole

  DBAlarmCPU:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-DB-High-CPU
      AlarmDescription: Alarm when DB CPU exceeds 80%
      MetricName: CPUUtilization
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DBInstance

  DBAlarmStorage:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-DB-Low-Storage
      AlarmDescription: Alarm when DB free storage is less than 10GB
      MetricName: FreeStorageSpace
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10000000000
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DBInstance

  DBAlarmConnections:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-DB-High-Connections
      AlarmDescription: Alarm when DB connections exceed 400
      MetricName: DatabaseConnections
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 400
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DBInstance

Conditions:
  IsMySQL: !Or
    - !Equals [!Ref DBEngine, mysql]
    - !Equals [!Ref DBEngine, mariadb]
  IsPostgres: !Equals [!Ref DBEngine, postgres]

Outputs:
  DBEndpoint:
    Description: Database endpoint
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub ${EnvironmentName}-DB-Endpoint

  DBPort:
    Description: Database port
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: !Sub ${EnvironmentName}-DB-Port

  DBName:
    Description: Database name
    Value: !Ref DBName
    Export:
      Name: !Sub ${EnvironmentName}-DB-Name

  DBSecurityGroupId:
    Description: Security group ID for the database
    Value: !Ref DBSecurityGroup
    Export:
      Name: !Sub ${EnvironmentName}-DB-SecurityGroup

  DBInstanceArn:
    Description: ARN of the RDS instance
    Value: !GetAtt DBInstance.DBInstanceArn
    Export:
      Name: !Sub ${EnvironmentName}-DB-ARN
